<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="/layout/defaultLayout.html">

    <div class="container-fluid px-4" layout:fragment="content">
        <h3 class="mt-4 mb-4">게시판 글쓰기</h3>

        <!-- 내용 시작 -->
        <div class="card mb-4">
            <div class="card-header">
                <i class="fas fa-table me-1"></i>
                OOO 글쓰기
            </div>
            <div class="card-body">

                <form>
                    <div class="mb-3">
                        <label for="exampleFormControlInput1" class="form-label">글제목</label>
                        <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="글 제목 입력">
                    </div>
                    <div class="mb-3">
                        <label for="exampleFormControlTextarea1" class="form-label">글내용</label>
                        <textarea class="form-control" id="exampleFormControlTextarea1" rows="10" placeholder="글 내용 입력"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="formFileMultiple" class="form-label">파일첨부</label>
                        <input class="form-control" type="file" id="formFileMultiple" multiple>
                    </div>


                </form>

            </div>

        </div>

        <div class="text-end">
            <a th:href="@{/article/list}" class="btn btn-secondary">취소</a>
            <a th:href="@{/article/write}" class="btn btn-primary">글등록</a>
        </div>
        <!-- 내용 끝 -->
    </div>
</html>
